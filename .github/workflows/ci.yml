name: Backend CI/CD (Test + Build + Deploy Simulado)

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"

  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: 🧪 Tests (Unit + Integration)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear .env
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=userdb" >> .env
          echo "DB_TEST_NAME=userdb_test" >> .env
          echo "DB_HOST=postgres-test" >> .env
          echo "NODE_ENV=test" >> .env

      - name: Levantar servicios
        run: docker compose up -d postgres-test

      - name: Esperar DB
        run: sleep 10

      - name: Unit Tests
        run: docker compose run --rm api npm run test:unit

      - name: Integration Tests
        run: docker compose run --rm api npm run test:integration

      - name: Logs si falla
        if: failure()
        run: docker compose logs

      - name: Apagar contenedores
        if: always()
        run: docker compose down

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagen
        run: docker build -t backend-app ./backend

      - name: Verificar imagen
        run: docker images

  deploy-simulado:
    name: Deploy Simulado
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear .env producción
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=userdb" >> .env
          echo "DB_HOST=postgres" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Levantar servicios (API + DB)
        run: docker compose up -d

      - name: Esperar app
        run: sleep 5

      - name: Verificar API
        run: |
          curl -f http://localhost:3000/health | grep "OK"

      - name: Logs si falla
        if: failure()
        run: docker logs backend-test

      - name:  Limpiar contenedor
        if: always()
        run: docker compose down